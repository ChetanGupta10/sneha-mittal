<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #fff0f5;
      color: #333;
    }
    section {
      padding: 60px 20px;
      text-align: center;
    }
    h1, h2 {
      color: #d6336c;
    }
    .photos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: auto;
    }
    .photos img {
      width: 100%;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    button {
      padding: 12px 25px;
      font-size: 16px;
      background: #d6336c;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
    }
    button:hover {
      background: #ad1457;
    }
  </style>
</head>
<body>

<section>
  <h1>Hey Love ❤️</h1>
  <p>I made something special just for you</p>
</section>

<section>
  <h2>Our Story</h2>
  <p>From strangers to something that feels magical…</p>
</section>

<section>
  <h2>My Favorite Photos of You 📸</h2>
  <div class="photos">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
  </div>
</section>

<section>
  <h2>What I Feel</h2>
  <p>You make my ordinary days feel extraordinary 💕</p>
</section>

<section>
  <h2>So… ❤️</h2>
  <p>Will you be mine?</p>
  <button onclick="alert('I hope your answer is YES 😘')">Yes</button>
</section>

</body>
</html>
